services:
  - type: web
    name: tripplanner-api
    env: python
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: TOKEN_EXPIRE_MINUTES
        value: 30
      - key: DATABASE_URL
        fromDatabase:
          name: tripplanner-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: pserv
    name: tripplanner-db
    env: postgresql
